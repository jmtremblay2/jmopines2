baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "JM's Site"
pagination.pagerSize = 5
enableGitInfo = true

[frontmatter]
  date = [':default']
  lastmod = [':git', ':fileModTime']

[markup.highlight]
  noClasses = false

[params]
  contentTypeName = "posts"
  showMenuItems = 5
  showLastUpdated = true
  fullWidthTheme = false
  centerTheme = true

[languages]
  [languages.en]
    languageName = "English"
    title = "JM's Site"

    [languages.en.params]
      subtitle = "hello, it's JM"
      owner = "JM"
      keywords = ""
      copyright = ""
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      newerPosts = "Newer posts"
      olderPosts = "Older posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"
      minuteReadingTime = "min read"
      words = "words"

      [languages.en.params.logo]
        logoText = "JM's Terminal"
        logoHomeLink = "/"

      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/about"
          weight = 1
        [[languages.en.menu.main]]
          identifier = "sitemap"
          name = "Sitemap"
          url = "/sitemap"
          weight = 2
        [[languages.en.menu.main]]
          identifier = "software"
          name = "Software"
          url = "/software"
          weight = 10
        [[languages.en.menu.main]]
          identifier = "config"
          name = "Config"
          url = "/config"
          weight = 11
        [[languages.en.menu.main]]
          identifier = "thissite"
          name = "This Site"
          url = "/thissite"
          weight = 12
        [[languages.en.menu.main]]
          identifier = "llm"
          name = "LLM"
          url = "/llm"
          weight = 13

[module]
  [[module.imports]]
    path = 'github.com/panr/hugo-theme-terminal/v4'
